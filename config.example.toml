[telegram]
# Bot token from @BotFather.
bot_token = ""
# Your Telegram User IDs (numeric) that are allowed to launch.
# Find your ID via @userinfobot (https://t.me/userinfobot), then put it here.
# Example: allowed_user_ids = [123456789]
allowed_user_ids = []
# Where to send bot error notifications. 0 / unset → first of allowed_user_ids.
alert_chat_id = 0

[projects]
# Directories with projects. Launching is only possible inside them.
# /claude accepts a folder name or a relative path like group/proj.
# Example: base_dirs = ["C:/projects", "K:/work"]
base_dirs = ["C:/projects"]
# Allow the bot to create new subfolders (via the "create and launch" button
# shown when /claude targets a missing folder).
allow_create = true

[launch]
# Command to open a terminal with Claude Code. {path} — absolute path to the folder.
# Windows Terminal (-w new = a separate new window) opens PowerShell 7 (pwsh)
# in the project folder and runs claude in it. The bot marks the folder as
# trusted itself (in ~/.claude.json) and --remote-control makes each session controllable from the
# phone without enabling Remote Control globally in Claude Code settings.
command = 'wt.exe -w new -d "{path}" pwsh -NoLogo -NoExit -Command claude --remote-control'

[logging]
level = "INFO"
