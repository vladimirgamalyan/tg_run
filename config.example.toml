[telegram]
# Bot token from @BotFather.
bot_token = ""
# Your Telegram User IDs (numeric) that are allowed to launch.
# Find your ID via @userinfobot (https://t.me/userinfobot), then put it here.
# Example: allowed_user_ids = [123456789]
allowed_user_ids = []

[projects]
# Directories with projects. Launching is only possible inside them.
# /run accepts a folder name or a relative path like group/proj.
# Example: base_dirs = ["C:/projects", "K:/work"]
base_dirs = ["C:/projects"]
# Allow the bot to create new subfolders (via the "create and launch" button
# shown when /run targets a missing folder).
allow_create = true
# Projects shown as one-tap buttons by /favorite. Same form as a /run
# argument: a folder name or a relative path like group/proj. Pressing a button
# does exactly what /run <project> does (launch, ask which root, or offer to
# create). Leave empty to disable the command.
# Example: favorites = ["my-app", "clients/acme"]
favorites = []

[launch]
# Command to open a terminal with Claude Code. {path} — absolute path to the folder.
# Leave commented out to use the built-in default for your OS:
#   Windows — Windows Terminal (a separate new window) running PowerShell 7 (pwsh).
#   macOS   — Terminal.app, opened via AppleScript (osascript).
# Either way, the bot marks the folder as trusted itself (in ~/.claude.json), and
# --remote-control makes each session controllable from the phone without
# enabling Remote Control globally in Claude Code settings. See DETAILS.md for
# the exact default commands and how to customize them (e.g. to use iTerm2
# instead of Terminal.app on macOS).
# command = 'wt.exe -w new -d "{path}" pwsh -NoLogo -NoExit -Command claude --remote-control'
# macOS default (Terminal.app via osascript):
# command = '''osascript -e 'tell application "Terminal" to do script "cd " & quoted form of "{path}" & " && claude --remote-control"' -e 'tell application "Terminal" to activate' '''

[logging]
level = "INFO"
